meters:
- name: platform_subscription
  description: Monthly platform subscription tier (Launch / Growth / Scale / Enterprise) that bundles API access. Primary cost driver.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - tier
- name: royalty_processing_volume
  description: Monthly royalty value processed; tiers cap or scale by processing volume.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - tier
- name: track_ingestion
  description: Tracks ingested; batch sizes scale by tier.
  unit: tracks
  aggregation: sum
  dimensions:
  - account
  - tier
- name: white_label
  description: Optional white-label / branded-portal customization add-on.
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: dsp_revenue_commission
  description: Revenue commission reportedly charged when distributing via Revelator's own DSP deals rather than client-managed deals.
  unit: percent
  aggregation: sum
  dimensions:
  - account
- name: premium_format_delivery
  description: Per-track and per-delivery fees for premium formats such as Dolby Atmos.
  unit: deliveries
  aggregation: sum
  dimensions:
  - account
  - format
principles:
- name: Visibility
  description: Track the platform subscription tier and any add-ons (white-label, premium formats, DSP commission) as the main spend lines; reconcile against Revelator invoices.
- name: Allocation
  description: Map child accounts / enterprises and API keys to internal cost centers, labels, or partner clients.
- name: Optimization
  description: Right-size the subscription tier to actual royalty-processing and ingestion volume; use client-managed DSP deals where the revenue commission outweighs convenience; limit premium-format deliveries to where they add value.
- name: Accountability
  description: Assign an owner for the Revelator relationship; review tier fit and add-on charges against budget on each billing cycle.
