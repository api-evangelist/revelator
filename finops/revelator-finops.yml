description: >-
  FinOps view of Revelator spend. Revelator is a sales-led subscription SaaS
  platform; API access is bundled into platform plans rather than billed as
  metered API usage. The primary cost driver is the monthly subscription tier,
  with reported add-ons such as white-label customization, a revenue commission
  when using Revelator's own DSP deals, and per-track/per-delivery fees for
  premium formats (e.g. Dolby Atmos). Specific rates are sales-led and not
  reconciled here.
notes: >-
  Pricing is not published as official API pricing and cost figures come from
  third-party sources; verify directly with Revelator. reconciled is false.
sources:
- https://www.revelator.com/pricing/revelator-api
