aid: revelator
url: https://raw.githubusercontent.com/api-evangelist/revelator/refs/heads/main/apis.yml
name: Revelator
kind: company
description: Revelator is a music distribution and rights, royalties, and payments
  infrastructure platform for labels, distributors, and music businesses. Its REST
  API exposes the digital supply chain - distribution, catalog, analytics and trends,
  royalty accounting, and payments - behind a single OAuth2 Bearer-token interface
  using a child-account model.
